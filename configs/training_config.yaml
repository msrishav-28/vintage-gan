# VintageGAN training configuration.
# Default profile is local_256 for RTX 3050 4GB class GPUs.

active_profile: local_256

dataset:
  # Generic clean-image dataset root with explicit train/val folders.
  imagenet_path: "data/public_images"
  filmset_path: "data/filmset"
  synthetic_pairs_path: "data/synthetic_pairs"
  validation_path: "data/validation"
  dataset_name: "user-provided or legally allowed public clean-image set"
  dataset_license: "record exact source/license before reporting results"
  split_seed: 42
  allow_split_fallback: false

  num_train_images: 1000
  num_val_images: 200
  variants_per_image: 4
  val_variants_per_image: 2
  image_size: 256
  normalize_range: [-1, 1]

augmentation:
  horizontal_flip_prob: 0.5
  brightness_jitter: 0.1
  contrast_jitter: 0.1
  apply_to_both: true

model:
  generator:
    base_model: "custom_conditioned_unet"
    in_channels: 3
    out_channels: 3
    condition_dim: 6
    use_spectral_norm: true
    dropout_rate: 0.2
    use_self_attention: true

  discriminator:
    type: "conditional_patchgan"
    in_channels: 9
    base_filters: 64
    use_spectral_norm: true
    use_instance_norm: true
    output_patches: "dynamic: image_size / 16"

conditioning:
  parameters:
    - grain
    - scratch
    - dust
    - vignette
    - color_shift
    - blur
  integration_method: "spatial_replication_plus_bottleneck_projection"
  presets_config: "configs/presets.yaml"

training:
  phase1_pretrain:
    epochs: 8
    optimizer: "adam"
    learning_rate: 2.0e-4
    betas: [0.5, 0.999]
    scheduler: "cosine_annealing"
    pixel_loss_weight: 1.0
    perceptual_loss_weight: 0.05

  phase2_critic:
    epochs: 2
    optimizer: "adam"
    learning_rate: 2.0e-4
    betas: [0.5, 0.999]

  phase3_gan:
    epochs: 5
    optimizer: "adam"
    learning_rate: 2.0e-5
    betas: [0.5, 0.999]
    adversarial_loss_weight: 1.0
    pixel_loss_weight: 0.5
    perceptual_loss_weight: 0.05
    consistency_loss_weight: 0.0
    d_updates_per_batch: 1
    g_updates_per_batch: 1
    patience: 3

hardware:
  device: "cuda"
  batch_size: 1
  num_workers: 0
  pin_memory: true
  drop_last: false
  mixed_precision: true
  gradient_accumulation_steps: 4
  gradient_checkpointing: false
  expected_vram_gb: 4.0

perceptual_loss:
  backbone: "vgg16"
  pretrained: true
  normalize_input: true

consistency_loss:
  use_detectors: false
  detector_checkpoint_dir: "checkpoints/detectors"

checkpointing:
  save_dir: "checkpoints"
  save_every_n_epochs: 2
  save_best_only: false
  metric_for_best: "validation_loss"
  save_optimizer_state: true

logging:
  use_tensorboard: true
  use_wandb: false
  log_every_n_steps: 20
  save_images_every_n_epochs: 1
  num_sample_images: 4
  metrics:
    - "loss/generator"
    - "loss/discriminator"
    - "loss/pixel"
    - "loss/perceptual"
    - "loss/consistency"

evaluation:
  val_every_n_epochs: 1
  calculate_fid: false
  calculate_ssim: true
  calculate_psnr: true
  calculate_is: false
  fid_batch_size: 16
  fid_dims: 2048
  targets:
    fid: null
    ssim: null
    psnr: null
    condition_mae: null

reproducibility:
  seed: 42
  deterministic: true
  benchmark: false

paths:
  project_root: "."
  data_root: "data"
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
  output_dir: "outputs"
  cache_dir: ".cache"

profiles:
  local_256:
    dataset:
      image_size: 256
      num_train_images: 1000
      num_val_images: 200
      variants_per_image: 4
      val_variants_per_image: 2
    hardware:
      batch_size: 1
      num_workers: 0
      gradient_accumulation_steps: 4
      expected_vram_gb: 4.0
    training:
      phase1_pretrain:
        epochs: 8
      phase2_critic:
        epochs: 2
      phase3_gan:
        epochs: 5

  cloud_384:
    dataset:
      image_size: 384
      num_train_images: 5000
      num_val_images: 500
      variants_per_image: 4
      val_variants_per_image: 2
    hardware:
      batch_size: 2
      num_workers: 4
      gradient_accumulation_steps: 4
      expected_vram_gb: 8.0
    training:
      phase1_pretrain:
        epochs: 20
      phase2_critic:
        epochs: 5
      phase3_gan:
        epochs: 10

  cloud_512:
    dataset:
      image_size: 512
      num_train_images: 10000
      num_val_images: 1000
      variants_per_image: 5
      val_variants_per_image: 3
    hardware:
      batch_size: 2
      num_workers: 8
      gradient_accumulation_steps: 8
      expected_vram_gb: 12.0
    training:
      phase1_pretrain:
        epochs: 40
      phase2_critic:
        epochs: 10
      phase3_gan:
        epochs: 10
